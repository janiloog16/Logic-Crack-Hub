services:
  - type: web
    name: logic-crack-hub-api
    runtime: go
    plan: free
    buildCommand: go build -o bin/api ./cmd/api
    startCommand: ./bin/api
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
